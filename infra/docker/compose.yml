services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
    ports:
      - "55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - app_net

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/relay.Dockerfile
    command: ["pnpm", "db:migrate"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - app_net

  relay:
    build:
      context: ../..
      dockerfile: infra/docker/relay.Dockerfile
    command: ["pnpm", "--filter", "@newsportal/relay", "start"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RELAY_PORT: ${RELAY_PORT:-4000}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      RELAY_ENABLE_EMBED_FANOUT: ${RELAY_ENABLE_EMBED_FANOUT:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${RELAY_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - app_net

  fetchers:
    build:
      context: ../..
      dockerfile: infra/docker/fetchers.Dockerfile
    command: ["pnpm", "--filter", "@newsportal/fetchers", "start"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      FETCHERS_PORT: ${FETCHERS_PORT:-4100}
      FETCHERS_POLL_INTERVAL_MS: ${FETCHERS_POLL_INTERVAL_MS:-5000}
      FETCHERS_BATCH_SIZE: ${FETCHERS_BATCH_SIZE:-100}
      FETCHERS_CONCURRENCY: ${FETCHERS_CONCURRENCY:-4}
      FETCHERS_REQUEST_TIMEOUT_MS: ${FETCHERS_REQUEST_TIMEOUT_MS:-10000}
      FETCHERS_USER_AGENT: ${FETCHERS_USER_AGENT:-NewsPortalFetchers/0.1 (+https://newsportal.local)}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4100/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/python-app.Dockerfile
    working_dir: /workspace/services/workers
    command: ["python", "-m", "app.main"]
    volumes:
      - ../../data:/workspace/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-auto}
      EMBEDDING_HASH_DIMENSIONS: ${EMBEDDING_HASH_DIMENSIONS:-384}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/workspace/data/models}
      HNSW_INDEX_ROOT: ${HNSW_INDEX_ROOT:-/workspace/data/indices}
      HNSW_SNAPSHOT_ROOT: ${HNSW_SNAPSHOT_ROOT:-/workspace/data/snapshots}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-0}
      DISCOVERY_CRON: ${DISCOVERY_CRON:-0 */6 * * *}
      DISCOVERY_BUDGET_CENTS_DEFAULT: ${DISCOVERY_BUDGET_CENTS_DEFAULT:-500}
      DISCOVERY_MAX_HYPOTHESES_PER_RUN: ${DISCOVERY_MAX_HYPOTHESES_PER_RUN:-20}
      DISCOVERY_MAX_SOURCES_DEFAULT: ${DISCOVERY_MAX_SOURCES_DEFAULT:-20}
      DISCOVERY_AUTO_APPROVE_THRESHOLD: ${DISCOVERY_AUTO_APPROVE_THRESHOLD:-}
      DISCOVERY_SEARCH_PROVIDER: ${DISCOVERY_SEARCH_PROVIDER:-ddgs}
      DISCOVERY_DDGS_BACKEND: ${DISCOVERY_DDGS_BACKEND:-auto}
      DISCOVERY_DDGS_REGION: ${DISCOVERY_DDGS_REGION:-us-en}
      DISCOVERY_DDGS_SAFESEARCH: ${DISCOVERY_DDGS_SAFESEARCH:-moderate}
      DISCOVERY_GEMINI_API_KEY: ${DISCOVERY_GEMINI_API_KEY:-}
      DISCOVERY_GEMINI_MODEL: ${DISCOVERY_GEMINI_MODEL:-}
      DISCOVERY_GEMINI_BASE_URL: ${DISCOVERY_GEMINI_BASE_URL:-}
      DISCOVERY_LLM_INPUT_COST_PER_MILLION_USD: ${DISCOVERY_LLM_INPUT_COST_PER_MILLION_USD:-}
      DISCOVERY_LLM_OUTPUT_COST_PER_MILLION_USD: ${DISCOVERY_LLM_OUTPUT_COST_PER_MILLION_USD:-}
      DISCOVERY_MONTHLY_BUDGET_CENTS: ${DISCOVERY_MONTHLY_BUDGET_CENTS:-0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      EMAIL_DIGEST_SMTP_URL: ${EMAIL_DIGEST_SMTP_URL:-}
      EMAIL_DIGEST_FROM: ${EMAIL_DIGEST_FROM:-alerts@newsportal.local}
      WORKER_ENABLE_USER_DIGEST_SCHEDULER: ${WORKER_ENABLE_USER_DIGEST_SCHEDULER:-1}
      WORKER_USER_DIGEST_POLL_INTERVAL_SECONDS: ${WORKER_USER_DIGEST_POLL_INTERVAL_SECONDS:-5}
      WORKER_SEQUENCE_RUNNER_CONCURRENCY: ${WORKER_SEQUENCE_RUNNER_CONCURRENCY:-4}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-mailto:alerts@newsportal.local}
      LLM_REVIEW_ENABLED: ${LLM_REVIEW_ENABLED:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, psycopg, redis; psycopg.connect(f\"postgresql://{os.getenv('POSTGRES_USER')}:{os.getenv('POSTGRES_PASSWORD')}@{os.getenv('POSTGRES_HOST')}:{os.getenv('POSTGRES_PORT')}/{os.getenv('POSTGRES_DB')}\").close(); redis.Redis(host=os.getenv('REDIS_HOST'), port=int(os.getenv('REDIS_PORT'))).ping()"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  api:
    build:
      context: ../..
      dockerfile: infra/docker/python-app.Dockerfile
    working_dir: /workspace/services/api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ../../data:/workspace/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/workspace/data/models}
      HNSW_INDEX_ROOT: ${HNSW_INDEX_ROOT:-/workspace/data/indices}
      HNSW_SNAPSHOT_ROOT: ${HNSW_SNAPSHOT_ROOT:-/workspace/data/snapshots}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-0}
      DISCOVERY_CRON: ${DISCOVERY_CRON:-0 */6 * * *}
      DISCOVERY_BUDGET_CENTS_DEFAULT: ${DISCOVERY_BUDGET_CENTS_DEFAULT:-500}
      DISCOVERY_SEARCH_PROVIDER: ${DISCOVERY_SEARCH_PROVIDER:-ddgs}
      DISCOVERY_GEMINI_MODEL: ${DISCOVERY_GEMINI_MODEL:-}
      DISCOVERY_MONTHLY_BUDGET_CENTS: ${DISCOVERY_MONTHLY_BUDGET_CENTS:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEWSPORTAL_APP_BASE_URL: ${NEWSPORTAL_WEB_APP_BASE_URL:-http://127.0.0.1:4321/}
    command: ["pnpm", "--filter", "@newsportal/web", "start"]
    environment:
      WEB_PORT: ${WEB_PORT:-4321}
      NEWSPORTAL_APP_BASE_URL: ${NEWSPORTAL_WEB_APP_BASE_URL:-http://127.0.0.1:4321/}
      NEWSPORTAL_API_BASE_URL: ${NEWSPORTAL_API_BASE_URL:-http://api:8000}
      NEWSPORTAL_PUBLIC_API_BASE_URL: ${NEWSPORTAL_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      APP_SECRET: ${APP_SECRET:-}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${WEB_PORT:-4321}:4321"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/admin.Dockerfile
      args:
        NEWSPORTAL_APP_BASE_URL: ${NEWSPORTAL_ADMIN_APP_BASE_URL:-http://127.0.0.1:4322/}
    command: ["pnpm", "--filter", "@newsportal/admin", "start"]
    environment:
      ADMIN_PORT: ${ADMIN_PORT:-4322}
      NEWSPORTAL_APP_BASE_URL: ${NEWSPORTAL_ADMIN_APP_BASE_URL:-http://127.0.0.1:4322/}
      NEWSPORTAL_API_BASE_URL: ${NEWSPORTAL_API_BASE_URL:-http://api:8000}
      NEWSPORTAL_PUBLIC_API_BASE_URL: ${NEWSPORTAL_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-0}
      DISCOVERY_CRON: ${DISCOVERY_CRON:-0 */6 * * *}
      DISCOVERY_SEARCH_PROVIDER: ${DISCOVERY_SEARCH_PROVIDER:-ddgs}
      DISCOVERY_GEMINI_MODEL: ${DISCOVERY_GEMINI_MODEL:-}
      DISCOVERY_MONTHLY_BUDGET_CENTS: ${DISCOVERY_MONTHLY_BUDGET_CENTS:-0}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      APP_SECRET: ${APP_SECRET:-}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${ADMIN_PORT:-4322}:4322"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4322/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  mcp:
    build:
      context: ../..
      dockerfile: infra/docker/mcp.Dockerfile
    command: ["pnpm", "--filter", "@newsportal/mcp", "start"]
    environment:
      MCP_PORT: ${MCP_PORT:-4300}
      NEWSPORTAL_API_BASE_URL: ${NEWSPORTAL_API_BASE_URL:-http://api:8000}
      NEWSPORTAL_PUBLIC_API_BASE_URL: ${NEWSPORTAL_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_USER: ${POSTGRES_USER:-newsportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsportal}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${MCP_PORT:-4300}:4300"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4300/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
      relay:
        condition: service_healthy
      mcp:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app_net

volumes:
  pg_data:
  redis_data:

networks:
  app_net:
