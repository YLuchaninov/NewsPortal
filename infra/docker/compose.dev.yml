services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres:
    env_file:
      - ../../.env.dev

  redis:
    env_file:
      - ../../.env.dev

  migrate:
    env_file:
      - ../../.env.dev

  relay:
    env_file:
      - ../../.env.dev

  fetchers:
    env_file:
      - ../../.env.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    env_file:
      - ../../.env.dev

  api:
    env_file:
      - ../../.env.dev

  web:
    env_file:
      - ../../.env.dev

  admin:
    env_file:
      - ../../.env.dev

  mcp:
    env_file:
      - ../../.env.dev
