version: 42
mode: Minimal
initialized: true
core:
  style: compact-strict-polished-blueprint-capability-planning
  installed_files:
    - AGENTS.md
    - docs/work.md
    - docs/blueprint.md
    - docs/engineering.md
    - docs/verification.md
    - docs/history.md
    - .aidp/os.yaml
coordination:
  multi_agent_allowed: false
  single_worktree_truth_required: true
  secondary_active_item_requires_explicit_reason: true
  secondary_active_item_short_overlap_only: true
planning:
  requirements_driven_capability_design: true
  capabilities_can_span_multiple_stages: true
  stages_must_be_planned_separately: true
  stage_done_is_not_capability_complete: true
  capability_completion_may_include_implementation_and_operator_closure: true
  create_next_stage_before_implementation_when_needed: true
  stage_dependency_enforcement: true
  dependency_override_requires_human_approval: true
project:
  name: newsportal
  placeholder_values_present: false
  shape: polyglot-monorepo
  runtime_surfaces:
    - apps/web
    - apps/admin
    - services/fetchers
    - services/relay
    - services/api
    - services/workers
    - services/ml
    - services/indexer
  delivery_surfaces:
    - infra/docker/compose.yml
    - infra/docker/compose.dev.yml
    - infra/docker/compose.prod.yml
    - infra/nginx/default.conf
    - README.md
    - docs/contracts/browser-assisted-websites.md
    - docs/contracts/content-model.md
    - docs/contracts/discovery-agent.md
    - docs/contracts/independent-recall-discovery.md
    - docs/contracts/zero-shot-interest-filtering.md
    - docs/contracts/universal-selection-profiles.md
    - docs/contracts/test-access-and-fixtures.md
    - docs/contracts/universal-task-engine.md
  entry_points:
    - apps/web/src/pages/api/health.ts
    - apps/admin/src/pages/api/health.ts
    - apps/admin/src/pages/automation.astro
    - apps/admin/src/pages/bff/admin/automation.ts
    - apps/admin/src/pages/discovery.astro
    - apps/admin/src/pages/bff/admin/discovery.ts
    - services/fetchers/src/main.ts
    - services/fetchers/src/enrichment.ts
    - services/relay/src/main.ts
    - services/api/app/main.py
    - services/workers/app/main.py
    - services/workers/app/discovery_orchestrator.py
    - services/workers/app/task_engine/executor.py
    - services/indexer/app/main.py
capabilities:
  build: true
  lint: true
  typecheck: true
  unit_tests: true
  integration_tests: true
  smoke_tests: true
  packaging: false
  deploy: false
  database: true
  migrations: true
commands:
  install: "pnpm install"
  dev: "pnpm dev:mvp:internal"
  dev_no_build: "pnpm dev:mvp:internal:no-build"
  dev_stop: "pnpm dev:mvp:internal:stop"
  dev_down: "pnpm dev:mvp:internal:down"
  dev_down_volumes: "pnpm dev:mvp:internal:down:volumes"
  dev_logs: "pnpm dev:mvp:internal:logs"
  build: "pnpm build"
  lint: "pnpm lint"
  typecheck: "pnpm typecheck"
  unit_tests: "pnpm unit_tests"
  article_yield_diagnostics: "pnpm article:yield:diagnostics"
  article_yield_remediate: "pnpm article:yield:remediate -- --apply"
  website_projection_replay: "pnpm website:projection:replay"
  website_projection_replay_compose: "pnpm website:projection:replay:compose"
  migrations_smoke: "pnpm test:migrations:smoke"
  integration_tests: "pnpm integration_tests"
  smoke: "pnpm integration_tests"
  web_viewports_smoke: "pnpm test:web:viewports"
  ingest_smoke: "pnpm test:ingest:compose"
  channel_auth_compose_smoke: "pnpm test:channel-auth:compose"
  website_compose_smoke: "pnpm test:website:compose"
  website_admin_compose_smoke: "pnpm test:website:admin:compose"
  automation_admin_smoke: "node infra/scripts/test-automation-admin-flow.mjs"
  discovery_admin_compose_smoke: "pnpm test:discovery:admin:compose"
  discovery_examples_compose_proof: "pnpm test:discovery:examples:compose"
  discovery_nonregression_compose_proof: "pnpm test:discovery:nonregression:compose"
  discovery_yield_compose_proof: "pnpm test:discovery:yield:compose"
  hard_sites_compose_smoke: "pnpm test:hard-sites:compose"
  feed_ingress_adapter_smoke: "pnpm test:feed-ingress-adapters:smoke"
  enrichment_compose_smoke: "pnpm test:enrichment:compose"
  discovery_enabled_compose_smoke: "pnpm test:discovery-enabled:compose"
  llm_budget_stop_smoke: "pnpm test:llm-budget-stop:smoke"
  llm_budget_stop_compose_smoke: "pnpm test:llm-budget-stop:compose"
  ingest_multi_compose: "pnpm test:ingest:multi:compose"
  ingest_soak_compose: "pnpm test:ingest:soak:compose"
  cluster_match_notify_compose: "pnpm test:cluster-match-notify:compose"
  reindex_backfill_compose: "pnpm test:reindex-backfill:compose"
  package_release: ""
  deploy: ""
risk_defaults:
  low: локальная целевая проверка
  medium: статическая проверка плюс поведенческая проверка по затронутой границе
  high: полный релевантный gate-набор плюс усиленная проверка границ и остаточных рисков
work_kinds:
  - Stage
  - Patch
  - Sweep
  - Spike
states:
  - planned
  - ready
  - active
  - blocked
  - done
  - archived
allowed_transitions:
  - planned->ready
  - ready->active
  - active->blocked
  - blocked->ready
  - active->done
  - done->archived
context_hygiene:
  short_current_memory: true
  durable_full_history: true
  current_memory_target_lines: 20-40
  recent_changes_max_bullets: 8
  auto_compress_triggers:
    - item_done
    - item_archiving
    - primary_item_changed
    - work_doc_exceeds_limits
    - recent_changes_overflow
    - stale_completed_detail_in_live_doc
    - stale_capability_line_after_replan
    - meaningful_handoff_or_session_end
  compression_command: RUN CONTEXT COMPRESSION NOW
handoff:
  required_after_meaningful_work: true
  required_fields:
    - current_item_status
    - next_recommended_action
    - proven_state
    - unproven_or_blocked_state
    - scope_or_coordination_warning
audit_mode:
  enabled: true
  optional: true
  default_mode: read_only
  audit_command: RUN CONSISTENCY AUDIT NOW
  apply_command: APPLY APPROVED AUDIT FIXES NOW
  approval_required_for_apply: true
  safe_fix_scope:
    - move_completed_detail_to_history
    - normalize_required_sections
    - add_missing_empty_required_blocks
    - shrink_current_memory_preserving_meaning
    - archive_done_item_with_durable_history
    - remove_obvious_live_doc_duplication
  forbidden_fix_scope:
    - change_architecture_or_invariants
    - change_risk_level_without_human_decision
    - redefine_work_intent_by_guesswork
    - redefine_scope_semantics
    - rewrite_proof_policy_meaning
    - change_machine_facts_by_guesswork
maintenance:
  agent_managed_core: true
  work_sync_required_after_meaningful_change: true
  stage_and_capability_sync_required: true
  worktree_coherence_check_required: true
  context_compression_required_on_trigger: true
  audit_request_driven: true
  archive_sync_required_on_done: true
  capability_archive_required_when_no_live_next_stage: true
authority:
  order:
    - AGENTS.md
    - docs/blueprint.md
    - .aidp/os.yaml
    - docs/engineering.md
    - docs/verification.md
    - docs/work.md
    - docs/history.md
  preserve_blueprint_truth_on_execution_conflict: true
deep_contract_docs:
  allowed: true
  required_when_touched: true
  temporary_docs_must_merge_into_history_or_stable_contract: true
  preferred_locations:
    - docs/contracts/
  templates_included: true
setup_mode:
  enabled_until_core_is_initialized: true
  implementation_forbidden_while_uninitialized: true
  initialization_requires:
    - real_project_name
    - real_commands_or_explicit_proof_gaps
    - real_blueprint_content
    - real_engineering_content
    - real_work_state
    - placeholders_removed_or_replaced
proof_contours:
  fast_gate: smallest honest local proof
  structural_gate: boundary- or refactor-sensitive proof
  release_gate: releasable build or promotion proof
  delivery_gate: packaging, deployment, migration, or environment delivery proof
  runtime_smoke_gate: minimal real runtime proof
runtime_facts:
  zero_shot_filtering:
    deep_contract: docs/contracts/zero-shot-interest-filtering.md
    profile_evolution_contract: docs/contracts/universal-selection-profiles.md
    stage1_tables:
      - canonical_documents
      - document_observations
    stage1_identity_rule: canonical_document_id_reuses_canonical_article_doc_id
    stage2_tables:
      - story_clusters
      - story_cluster_members
      - verification_results
    stage2_runtime_owner: services/workers/app/main.py::process_cluster
    stage3_tables:
      - interest_filter_results
    stage3_runtime_owners:
      - services/workers/app/main.py::process_match_criteria
      - services/workers/app/main.py::process_match_interests
      - services/workers/app/main.py::process_llm_review
    stage4_tables:
      - final_selection_results
    stage4_runtime_owners:
      - services/workers/app/main.py::upsert_final_selection_result
      - services/workers/app/main.py::upsert_system_feed_result
      - services/api/app/main.py::editorial_content_select_sql
    stage6_operator_surfaces:
      - services/api/app/main.py::get_article
  universal_selection_profiles:
    deep_contract: docs/contracts/universal-selection-profiles.md
    stage1_tables:
      - selection_profiles
    stage1_runtime_owners:
      - apps/admin/src/lib/server/admin-templates.ts::syncInterestTemplateSelectionProfile
      - apps/admin/src/pages/bff/admin/templates.ts::POST
    stage1_compatibility_sources:
      - interest_templates
      - criteria
    stage2_runtime_owners:
      - services/workers/app/selection_profiles.py::coerce_selection_profile_runtime
      - services/workers/app/main.py::process_match_criteria
    stage2_behavior:
      - profile_backed_gray_zone_defaults_to_hold
      - llm_review_optional_only_by_profile_policy
      - legacy_criteria_without_profile_keep_always_review_fallback
    stage3_runtime_owners:
      - services/workers/app/final_selection.py::summarize_final_selection_result
      - services/workers/app/main.py::upsert_final_selection_result
      - services/workers/app/main.py::upsert_system_feed_result
    stage3_behavior:
      - final_selection_distinguishes_llm_review_pending_from_hold
      - profile_backed_hold_projects_as_filtered_out_compatibility
      - legacy_profileless_gray_zone_can_still_project_pending_llm
    stage4_explain_surfaces:
      - services/api/app/main.py::get_article_explain
      - services/api/app/main.py::get_content_item_explain
      - services/api/app/main.py::list_system_interests
      - services/api/app/main.py::get_system_interest
      - services/api/app/main.py::build_selection_explain_payload
      - apps/admin/src/pages/articles.astro
      - apps/admin/src/pages/articles/[docId].astro
      - apps/admin/src/pages/resources.astro
      - apps/admin/src/pages/resources/[resourceId].astro
      - apps/admin/src/pages/templates/interests.astro
      - apps/admin/src/pages/templates/interests/new.astro
      - apps/admin/src/pages/templates/interests/[interestTemplateId]/edit.astro
    stage4_shared_helper: apps/admin/src/lib/server/operator-surfaces.ts
    stage4_behavior:
      - explain_surfaces_expose_selection_reason_and_counts
      - operator_surfaces_translate_hold_vs_pending_review_without_fixed_taxonomy
      - api_explain_payloads_expose_generic_selection_diagnostics
      - system_interest_authoring_surfaces_expose_profile_policy_summary
    stage5_runtime_owners:
      - services/workers/app/main.py::read_active_selection_profile_snapshot
      - services/workers/app/main.py::process_reindex
      - services/api/app/main.py::list_reindex_jobs
      - services/api/app/main.py::get_article
      - services/api/app/main.py::list_articles
      - apps/admin/src/pages/reindex.astro
      - apps/admin/src/lib/server/live-updates.ts::mapReindexJob
      - apps/admin/src/lib/server/operator-surfaces.ts::resolveArticleOperatorState
    stage5_backfill_proof_command: pnpm test:reindex-backfill:compose
    stage5_behavior:
      - backfill_and_repair_results_record_selection_profile_snapshot
      - maintenance_reindex_reads_project_selection_profile_summary
      - maintenance_reindex_reads_project_structured_selection_profile_snapshot
      - article_operator_reads_project_generic_selection_payloads
      - compatibility_only_selection_state_is_normalized
    stage3_filter_scopes:
      - system_criterion
      - user_interest
    stage3_technical_filter_states:
      - passed
      - filtered_out
    stage3_semantic_decisions:
      - match
      - no_match
      - gray_zone
      - not_evaluated
    verification_states:
      - weak
      - medium
      - strong
      - conflicting
    stage4_final_decisions:
      - selected
      - rejected
      - gray_zone
    current_compatibility_truth:
      article_storage: articles
      legacy_story_clusters: event_clusters
      final_selection_gate: final_selection_results
      legacy_system_feed_projection: system_feed_results
  user_digests:
    immediate_channels:
      - web_push
      - telegram
    digest_recipient_channel_type: email_digest
    digest_settings_table: user_digest_settings
    digest_delivery_log_table: digest_delivery_log
    scheduler_enabled_env: WORKER_ENABLE_USER_DIGEST_SCHEDULER
    poll_interval_env: WORKER_USER_DIGEST_POLL_INTERVAL_SECONDS
  article_llm_review:
    scope: system_interest_gray_zone_criteria_only
    enabled_env: LLM_REVIEW_ENABLED
    monthly_budget_env: LLM_REVIEW_MONTHLY_BUDGET_CENTS
    post_budget_policy_env: LLM_REVIEW_BUDGET_EXHAUST_ACCEPT_GRAY_ZONE
    budget_source_of_truth: llm_review_log.cost_estimate_usd
    budget_scope_filter: criterion
    monthly_budget_window: utc_calendar_month
    post_budget_policy:
      "1": accept_gray_zone_as_relevant
      "0": reject_gray_zone_as_irrelevant
  discovery:
    architecture: graph_first_registry_driven
    namespace: /maintenance/discovery/*
    deep_contract: docs/contracts/discovery-agent.md
    enabled_default: false
    schema_drift_prerepair_migration: 0026a_discovery_schema_drift_prerepair.sql
    schema_drift_repair_migration: 0030_discovery_schema_drift_repair.sql
    schema_drift_residual_repair_migration: 0036_discovery_schema_residual_repair.sql
    migrations_smoke_scope: discovery_core_tables_indexes_columns_constraints
    source_quality_signal_source: generic_channel_quality
    downstream_selection_dependency: removed
    search_provider_default: ddgs
    search_stub_supported: true
    profile_policy_table: discovery_policy_profiles
    mission_profile_snapshot_columns:
      - discovery_missions.profile_id
      - discovery_missions.applied_profile_version
      - discovery_missions.applied_policy_json
      - discovery_recall_missions.profile_id
      - discovery_recall_missions.applied_profile_version
      - discovery_recall_missions.applied_policy_json
    class_registry_table: discovery_hypothesis_classes
    mission_planning_state: discovery_missions.interest_graph
    operator_surfaces: dual_path_mission_fit_generic_quality_recall_backlog_promotion_profile_explainability
    candidate_review_default: manual
    feedback_re_evaluation_loop: true
    source_registration_path: postgresql_plus_outbox_source_channel_sync
    admin_operator_smoke_command: pnpm test:discovery:admin:compose
    ddgs_defaults:
      backend: auto
      region: us-en
      safesearch: moderate
    llm_provider: gemini
    llm_model_env: DISCOVERY_GEMINI_MODEL
    llm_key_env: DISCOVERY_GEMINI_API_KEY
    llm_base_url_env: DISCOVERY_GEMINI_BASE_URL
    tariff_envs:
      input: DISCOVERY_LLM_INPUT_COST_PER_MILLION_USD
      output: DISCOVERY_LLM_OUTPUT_COST_PER_MILLION_USD
    monthly_budget_env: DISCOVERY_MONTHLY_BUDGET_CENTS
    monthly_budget_window: utc_calendar_month
  independent_recall_discovery:
    deep_contract: docs/contracts/independent-recall-discovery.md
    stage1_tables:
      - discovery_source_quality_snapshots
    stage2_tables:
      - discovery_recall_missions
      - discovery_recall_candidates
    stage1_runtime_owners:
      - services/workers/app/source_scoring.py::compute_source_recall_quality_snapshot
      - services/workers/app/discovery_orchestrator.py::execute_hypotheses
      - services/workers/app/discovery_orchestrator.py::re_evaluate_sources
      - services/api/app/main.py::list_discovery_source_quality_snapshots
    stage2_runtime_owners:
      - services/api/app/main.py::list_discovery_recall_missions
      - services/api/app/main.py::create_discovery_recall_mission
      - services/api/app/main.py::list_discovery_recall_candidates
      - services/api/app/main.py::create_discovery_recall_candidate
    stage3_runtime_owners:
      - services/workers/app/discovery_orchestrator.py::acquire_recall_missions
      - services/api/app/main.py::request_discovery_recall_mission_acquisition
    stage4_runtime_owners:
      - services/api/app/main.py::promote_discovery_recall_candidate
    stage5_runtime_owners:
      - services/api/app/main.py::get_discovery_summary
      - services/api/app/main.py::discovery_source_profile_select_sql
      - apps/admin/src/lib/server/operator-surfaces.ts::resolveDiscoveryOperatorSummary
      - apps/admin/src/lib/server/operator-surfaces.ts::resolveDiscoverySourceQuality
      - apps/admin/src/pages/discovery.astro
      - apps/admin/src/pages/help.astro
    stage1_read_routes:
      - /maintenance/discovery/source-quality-snapshots
      - /maintenance/discovery/source-quality-snapshots/{snapshot_id}
    stage2_read_write_routes:
      - /maintenance/discovery/recall-missions
      - /maintenance/discovery/recall-missions/{recall_mission_id}
      - /maintenance/discovery/recall-candidates
      - /maintenance/discovery/recall-candidates/{recall_candidate_id}
    stage3_action_routes:
      - /maintenance/discovery/recall-missions/{recall_mission_id}/acquire
    stage4_action_routes:
      - /maintenance/discovery/recall-candidates/{recall_candidate_id}/promote
    current_scope: shipped_dual_path_discovery_with_bounded_recall_promotion
    mission_planning_owner_unchanged: discovery_missions.interest_graph
    promotion_owners:
      - discovery_candidates_manual_review_into_source_channels
      - discovery_recall_candidates_bounded_promotion_into_source_channels
  enrichment:
    enabled_default: true
    feed_parser: extractus
    supported_formats:
      - rss2
      - rss1
      - atom
      - jsonfeed
    sequence_trigger: article.ingest.requested
    sequence_first_task: enrichment.article_extract
    fetchers_internal_endpoint: /internal/enrichment/articles/{doc_id}
    maintenance_retry_endpoint: /maintenance/articles/{doc_id}/enrichment/retry
    per_channel_default_enabled: true
    per_channel_default_min_body_length: 500
    api_manual_retry_requires_redis: true
  unified_ingress:
    common_downstream_trigger: article.ingest.requested
    provider_specific_logic_must_end_before: article.ingest.requested
    allowed_pre_handoff_triggers:
      - resource.ingest.requested
    provider_native_product_read_models_allowed: false
    shared_downstream_truth_owners:
      - articles
      - canonical_documents
      - document_observations
      - story_clusters
      - verification_results
      - interest_filter_results
      - final_selection_results
  rss_ingress:
    provider_type_remains: rss
    deep_contract: docs/contracts/feed-ingress-adapters.md
    adapter_strategy_config_field: source_channels.config_json.adapterStrategy
    max_entry_age_config_field: source_channels.config_json.maxEntryAgeHours
    inferred_strategies:
      reddit_search_rss: reddit.com search.rss
      hn_comments_feed: hnrss.org
      google_news_rss: news.google.com /rss/
    aggregator_default_max_entry_age_hours: 168
    article_provenance_field: articles.raw_payload_json.feedAdapter
    local_adapter_smoke_command: pnpm test:feed-ingress-adapters:smoke
  sequence_runtime:
    worker_sequence_runner_concurrency_env: WORKER_SEQUENCE_RUNNER_CONCURRENCY
    worker_sequence_runner_lock_duration_env: WORKER_SEQUENCE_RUNNER_LOCK_DURATION_MS
    worker_sequence_runner_stalled_interval_env: WORKER_SEQUENCE_RUNNER_STALLED_INTERVAL_MS
    python_fallback_default: 1
    local_compose_default: 4
    admin_operator_surface:
      page: apps/admin/src/pages/automation.astro
      bff: apps/admin/src/pages/bff/admin/automation.ts
    operator_smoke_command: node infra/scripts/test-automation-admin-flow.mjs
  web_ingestion:
    website_provider_enabled: true
    deep_contract: docs/contracts/browser-assisted-websites.md
    resource_table: web_resources
    crawl_policy_cache_table: crawl_policy_cache
    sequence_trigger: resource.ingest.requested
    sequence_first_task: enrichment.resource_extract
    fetchers_internal_endpoint: /internal/enrichment/resources/{resource_id}
    website_probe_internal_endpoint: /internal/discovery/websites/probe
    hidden_feed_auto_conversion: false
    browser_runtime_owner: services/fetchers
    browser_fallback_enabled_default: false
    browser_header_injection: same_origin_route_interception_only
    browser_assistance_scope: public_js_heavy_and_soft_anti_bot_only
    accepted_resource_handoff_owner: services/fetchers/src/resource-enrichment.ts::ensureProjectedArticle
    accepted_resource_handoff_target: articles_plus_article.ingest.requested
    legacy_projection_replay_owner: services/fetchers/src/cli/replay-website-projections.ts
    legacy_projection_replay_selector: projection_error_equals_legacy_resource_only_without_common_handoff
    resource_only_product_read_models: false
    acquisition_fairness_controls:
      - FETCHERS_RSS_CONCURRENCY
      - FETCHERS_WEBSITE_CONCURRENCY
    unsupported_browser_challenges:
      - login
      - captcha
      - cloudflare_js_challenge
      - unsupported_block
  source_channel_admin:
    operator_ready_provider_types:
      - rss
      - website
      - api
      - email_imap
    non_baseline_provider_types:
      - youtube
  source_channel_auth:
    storage_table: source_channels.auth_config_json
    supported_operator_surfaces:
      - rss
      - website
    supported_mode: static_authorization_header_only
    read_model_summary_field: has_authorization_header
    secrets_in_config_json_allowed: false
    website_application_scope: same_origin_only
engineering_defaults:
  preserve_behavior_unless_intentionally_changed: true
  keep_boundaries_clean: true
  avoid_god_objects: true
  prefer_explicit_contracts: true
  refactor_requires_proof: true
  dedicated_engineering_file_required: true
test_access:
  declared_environments_required: true
  production_like_requires_explicit_human_approval: true
  declared_identities_or_fixture_procedures_required: true
  ad_hoc_persistent_test_entities_forbidden: true
  persistent_test_artifacts_must_be_tracked: true
  cleanup_status_must_be_visible_for_stateful_testing: true
  recommended_deep_contract: docs/contracts/test-access-and-fixtures.md
