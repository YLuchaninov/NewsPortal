# AI Dev Process OS runtime schema для NewsPortal
package_version: 1.6.1
schema_version: 28
mode: Minimal
initialized: true
core:
  style: compact-strict-polished-blueprint-capability-planning-anti-drift
  installed_files:
  - .aidp/AGENTS.md
  - .aidp/work.md
  - .aidp/blueprint.md
  - .aidp/engineering.md
  - .aidp/verification.md
  - .aidp/history.md
  - .aidp/os.yaml
  - .aidp/contracts/article-pipeline-core.md
  - .aidp/contracts/auth-session-boundary.md
  - .aidp/contracts/browser-assisted-websites.md
  - .aidp/contracts/content-model.md
  - .aidp/contracts/discovery-agent.md
  - .aidp/contracts/feed-ingress-adapters.md
  - .aidp/contracts/independent-recall-discovery.md
  - .aidp/contracts/mcp-control-plane.md
  - .aidp/contracts/notifications-and-digests.md
  - .aidp/contracts/runtime-migrations-and-derived-state.md
  - .aidp/contracts/test-access-and-fixtures.md
  - .aidp/contracts/universal-selection-profiles.md
  - .aidp/contracts/universal-task-engine.md
  - .aidp/contracts/zero-shot-interest-filtering.md
coordination:
  multi_agent_allowed: false
  single_worktree_truth_required: true
  secondary_active_item_requires_explicit_reason: true
  secondary_active_item_short_overlap_only: true
planning:
  requirements_driven_capability_design: true
  capabilities_can_span_multiple_stages: true
  stages_must_be_planned_separately: true
  stage_done_is_not_capability_complete: true
  capability_completion_may_include_implementation_and_operator_closure: true
  create_next_stage_before_implementation_when_needed: true
  stage_dependency_enforcement: true
  dependency_override_requires_human_approval: true
project:
  name: news-portal
  placeholder_values_present: false
  shape: polyglot pnpm monorepo
  language: русский runtime-core; код и продуктовые docs могут быть смешанными ru/en по существующему стилю
  package_manager: pnpm
  primary_database: PostgreSQL
  queue_transport: Redis + BullMQ
  local_runtime: Docker Compose через infra/docker/compose.yml и infra/docker/compose.dev.yml
  runtime_surfaces:
  - Astro web app apps/web на порту 4321
  - Astro admin app apps/admin на порту 4322
  - FastAPI read/debug/maintenance API services/api на порту 8000
  - Node fetchers service services/fetchers на порту 4100
  - Node outbox relay services/relay на порту 4000
  - Node MCP control-plane service services/mcp на порту 4300
  - Python worker runtime services/workers
  - PostgreSQL на host port 55432 в local compose
  - Redis на host port 56379 в local compose
  - nginx local front door на host port 8080
  - Mailpit SMTP/UI в dev compose на портах 1025 и 8025
  delivery_surfaces:
  - Dockerfiles в infra/docker
  - compose baseline в infra/docker/compose.yml
  - dev overlay в infra/docker/compose.dev.yml
  - nginx config в infra/nginx/default.conf
  entry_points:
  - package.json root scripts
  - pnpm-workspace.yaml workspace packages
  - database/migrations ordered SQL migrations
  - services/api/app/main.py FastAPI app
  - services/workers/app/main.py worker app
  - services/fetchers/src/main.ts fetchers service
  - services/relay/src/main.ts relay service
  - services/mcp/src/main.ts MCP service
  - apps/web/src/pages and apps/admin/src/pages Astro routes
capabilities:
  build: true
  lint: true
  typecheck: true
  unit_tests: true
  integration_tests: true
  smoke_tests: true
  packaging: false
  deploy: false
  database: true
  migrations: true
commands:
  install: pnpm install
  python_dev_requirements: python -m pip install -r infra/docker/python.dev-requirements.txt
  dev: pnpm dev:mvp:internal
  dev_no_build: pnpm dev:mvp:internal:no-build
  dev_stop: pnpm dev:mvp:internal:stop
  dev_down: pnpm dev:mvp:internal:down
  dev_down_volumes: pnpm dev:mvp:internal:down:volumes
  dev_logs: pnpm dev:mvp:internal:logs
  check_scaffold: pnpm check:scaffold
  build: pnpm build
  lint: pnpm lint
  lint_ts: pnpm lint:ts
  lint_py: pnpm lint:py
  typecheck: pnpm typecheck
  unit_tests: pnpm unit_tests
  unit_tests_ts: pnpm unit_tests:ts
  unit_tests_py: pnpm unit_tests:py
  integration_tests: pnpm integration_tests
  product_local_core: pnpm test:product:local:core
  product_local_full: pnpm test:product:local:full
  product_local_cleanup: pnpm test:product:local:cleanup
  smoke: pnpm test:mvp:internal
  relay_tests: pnpm test:relay
  relay_compose: pnpm test:relay:compose
  relay_phase3: pnpm test:relay:phase3
  relay_phase3_compose: pnpm test:relay:phase3:compose
  relay_phase45_compose: pnpm test:relay:phase45:compose
  migrations_smoke: pnpm test:migrations:smoke
  db_seed_outbox_smoke: pnpm db:seed:outbox-smoke
  fetch_rss_once: pnpm fetch:rss:once
  rss_ingest_compose: pnpm test:ingest:compose
  rss_ingest_multi_compose: pnpm test:ingest:multi:compose
  rss_ingest_soak_compose: pnpm test:ingest:soak:compose
  website_compose: pnpm test:website:compose
  website_admin_compose: pnpm test:website:admin:compose
  website_matrix_compose: pnpm test:website:matrix:compose
  website_projection_replay: pnpm website:projection:replay
  website_projection_replay_compose: pnpm website:projection:replay:compose
  automation_admin_compose: pnpm test:automation:admin:compose
  discovery_enabled_compose: pnpm test:discovery-enabled:compose
  discovery_enabled_smoke: pnpm test:discovery-enabled:smoke
  discovery_admin_compose: pnpm test:discovery:admin:compose
  discovery_examples_compose: pnpm test:discovery:examples:compose
  discovery_nonregression_compose: pnpm test:discovery:nonregression:compose
  discovery_yield_compose: pnpm test:discovery:yield:compose
  mcp_compose: pnpm test:mcp:compose
  mcp_http_matrix: pnpm test:mcp:http:matrix
  mcp_http_auth: pnpm test:mcp:http:auth
  mcp_http_reads: pnpm test:mcp:http:reads
  mcp_http_writes: pnpm test:mcp:http:writes
  mcp_http_discovery: pnpm test:mcp:http:discovery
  mcp_http_live: pnpm test:mcp:http:live
  web_viewports: pnpm test:web:viewports
  web_ui_audit: pnpm test:web:ui-audit
  db_migrate: pnpm db:migrate
  article_yield_diagnostics: pnpm article:yield:diagnostics
  article_yield_remediate: pnpm article:yield:remediate
  feed_ingress_adapters_smoke: pnpm test:feed-ingress-adapters:smoke
  channel_auth_compose: pnpm test:channel-auth:compose
  criterion_compile_smoke: pnpm test:criterion-compile:smoke
  criterion_compile_compose: pnpm test:criterion-compile:compose
  cluster_match_notify_smoke: pnpm test:cluster-match-notify:smoke
  cluster_match_notify_compose: pnpm test:cluster-match-notify:compose
  llm_budget_stop_smoke: pnpm test:llm-budget-stop:smoke
  llm_budget_stop_compose: pnpm test:llm-budget-stop:compose
  reindex_backfill_compose: pnpm test:reindex-backfill:compose
  enrichment_compose: pnpm test:enrichment:compose
  hard_sites_compose: pnpm test:hard-sites:compose
  embed_smoke: pnpm test:embed:smoke
  embed_compose: pnpm test:embed:compose
  interest_compile_smoke: pnpm test:interest-compile:smoke
  interest_compile_compose: pnpm test:interest-compile:compose
  normalize_dedup_smoke: pnpm test:normalize-dedup:smoke
  normalize_dedup_compose: pnpm test:normalize-dedup:compose
  index_check_interest_centroids: pnpm index:check:interest-centroids
  index_check_event_cluster_centroids: pnpm index:check:event-cluster-centroids
  index_rebuild_interest_centroids: pnpm index:rebuild:interest-centroids
  index_rebuild_event_cluster_centroids: pnpm index:rebuild:event-cluster-centroids
  package_release: ''
  deploy: ''
proof_gaps:
  package_release: В репозитории не объявлен отдельный release packaging gate.
  deploy: Production deploy-команда не объявлена; baseline delivery proof идет через local compose.
risk_defaults:
  low: targeted local proof
  medium: static plus targeted behavioral proof
  high: full relevant gate set plus stronger review
work_kinds:
- Stage
- Patch
- Sweep
- Spike
states:
- planned
- ready
- active
- blocked
- done
- cancelled
- superseded
- archived
allowed_transitions:
- planned->ready
- ready->active
- active->blocked
- blocked->ready
- active->done
- planned->cancelled
- ready->cancelled
- active->cancelled
- blocked->cancelled
- planned->superseded
- ready->superseded
- active->superseded
- blocked->superseded
- done->archived
- cancelled->archived
- superseded->archived
routing:
  supported_live_modes:
  - setup
  - normal
  - repair
  live_mode_owner: .aidp/work.md
  initial_router_read_order:
  - .aidp/AGENTS.md
  - .aidp/os.yaml
  - .aidp/work.md
  deeper_read_order_defined_in_agents: true
  audit_requests_supported: true
  setup_required_until_initialized: true
context_hygiene:
  short_current_memory: true
  durable_full_history: true
  current_memory_target_lines: 20-40
  recent_changes_max_bullets: 8
  observation_quarantine_required: true
  attempt_memory_required: true
  parked_items_allowed: true
  phase_boundary_compression_preferred: true
  auto_compress_triggers:
  - item_done
  - item_archiving
  - primary_item_changed
  - work_doc_exceeds_limits
  - recent_changes_overflow
  - stale_completed_detail_in_live_doc
  - stale_capability_line_after_replan
  - meaningful_handoff_or_session_end
handoff:
  required_after_meaningful_work: true
  resume_protocol_required_on_new_session: true
  required_fields:
  - current_item_status
  - next_recommended_action
  - proven_state
  - unproven_or_blocked_state
  - scope_or_coordination_warning
audit_mode:
  enabled: true
  optional: true
  overlay_not_primary_live_mode: true
  work_doc_field: Audit overlay
  default_behavior: read_only_first
  approval_required_for_apply: true
maintenance:
  agent_managed_core: true
  router_materialization_must_be_merge_safe: true
  start_of_session_check_required: true
  resume_protocol_enforced_by_agent: true
  blocked_revalidation_required: true
  blocked_revalidation_after_days: 7
  live_docs_must_remain_relevant_to_current_active_work: true
  work_sync_required_after_meaningful_change: true
  stage_and_capability_sync_required: true
  worktree_coherence_check_required: true
  context_compression_required_on_trigger: true
  audit_request_driven: true
  archive_sync_required_on_done: true
  capability_archive_required_when_no_live_next_stage: true
authority:
  order:
  - .aidp/AGENTS.md
  - .aidp/blueprint.md
  - .aidp/os.yaml
  - .aidp/engineering.md
  - .aidp/verification.md
  - .aidp/work.md
  - .aidp/history.md
  preserve_blueprint_truth_on_execution_conflict: true
precedence:
  repo_canonical_truth: .aidp/*
  human_docs_explanatory_only: true
  external_global_instructions_are_hints_only: true
  transient_tool_outputs_require_sync_before_canonization: true
  external_provenance_required_before_canonization: true
anti_drift:
  observations_are_not_canonical_until_confirmed: true
  consolidation_gate_required: true
  explicit_supersede_required_for_conflicting_truth: true
  route_purity_required: true
  local_canonical_neighborhood_loading: true
  no_second_source_of_truth: true
delegation:
  read_only_research_subagents_allowed: true
  isolated_delegated_workers_require_explicit_scope: true
  parallel_write_same_worktree_forbidden: true
  delegated_context_contract_required: true
  subagent_output_is_observation_until_confirmed: true
deep_contract_docs:
  allowed: true
  required_when_touched: true
  temporary_docs_must_merge_into_history_or_stable_contract: true
  preferred_locations:
  - .aidp/contracts/
  templates_included: true
  active_contracts:
  - .aidp/contracts/article-pipeline-core.md
  - .aidp/contracts/auth-session-boundary.md
  - .aidp/contracts/browser-assisted-websites.md
  - .aidp/contracts/content-model.md
  - .aidp/contracts/discovery-agent.md
  - .aidp/contracts/feed-ingress-adapters.md
  - .aidp/contracts/independent-recall-discovery.md
  - .aidp/contracts/mcp-control-plane.md
  - .aidp/contracts/notifications-and-digests.md
  - .aidp/contracts/runtime-migrations-and-derived-state.md
  - .aidp/contracts/test-access-and-fixtures.md
  - .aidp/contracts/universal-selection-profiles.md
  - .aidp/contracts/universal-task-engine.md
  - .aidp/contracts/zero-shot-interest-filtering.md
setup_mode:
  enabled_until_core_is_initialized: true
  implementation_forbidden_while_uninitialized: true
  truthful_exit_requires:
    initialized_true: true
    placeholder_flag_false: true
    work_workflow_mode_not_setup: true
    setup_requirements_satisfied: true
  initialization_requires:
  - real_project_name
  - real_commands_or_explicit_proof_gaps
  - real_blueprint_content
  - real_engineering_content
  - real_work_state
  - placeholders_removed_or_replaced
proof_contours:
  fast_gate: smallest honest local proof
  structural_gate: boundary or refactor-sensitive proof
  release_gate: releasable build or promotion proof
  delivery_gate: packaging, deployment, migration, or environment delivery proof
  runtime_smoke_gate: minimal real runtime proof
engineering_defaults:
  preserve_behavior_unless_intentionally_changed: true
  keep_boundaries_clean: true
  avoid_god_objects: true
  prefer_explicit_contracts: true
  refactor_requires_proof: true
  dedicated_engineering_file_required: true
test_access:
  declared_environments_required: true
  production_like_requires_explicit_human_approval: true
  declared_identities_or_fixture_procedures_required: true
  ad_hoc_persistent_test_entities_forbidden: true
  persistent_test_artifacts_must_be_tracked: true
  cleanup_status_must_be_visible_for_stateful_testing: true
  recommended_deep_contract: .aidp/contracts/test-access-and-fixtures.md
history_sync:
  required: true
  completed_detail_must_leave_work_doc_by_end_of_sync_cycle: true
  handoff_forbidden_if_archive_sync_pending_without_note: true
  archive_index_recommended_for_long_running_projects: true
operator_safety:
  operator_safety_doc_included: true
